# PRII Federation — producer registry
# The Hub (thehub-pr) reads this to discover producer nodes, fetch their
# federation.json manifests, validate their export packages, and aggregate.
# Live-execution readiness is gated by ready_for_hub_live_execution in each
# producer's own federation.json (authoritative); status here reflects the
# Hub's view of the producer's current integration tier.
schema_version: hub_registry_v1
hub: thehub-pr

producers:
  - program_id: moneysweep-pr
    repo: jotaele44/moneysweep-pr
    role: public_money_intelligence_node
    federation_manifest: federation.json
    export_path: data/exports/canonical_v1_federation   # canonical_v1 bridge streams (auto-wrapped by the Hub)
    status: ready_for_discovery        # 9/14 required sources live-materialized (runtime keys supplied); live exec blocked: Tranche-B manual exports + cor3 portal export (JS-gated) + PROPUBLICA_API_KEY

  - program_id: spiderweb-pr
    repo: jotaele44/spiderweb-pr
    role: spatial_operational_producer
    federation_manifest: federation.json
    status: ready_for_live             # first real production package (1 site observation + 9 airport reference locations) hub-validated; ready_for_hub_live_execution=true (operator-approved 2026-07-03); corpus grows with the revived intake lane

  - program_id: aguayluz-pr
    repo: jotaele44/aguayluz-pr
    role: water_grid_monitoring_node
    federation_manifest: federation.json
    status: ready_for_live             # real power/PREPS/water data wired; ready_for_hub_live_execution=true; outage granularity caveated (snapshot-grade until MiLUMA data-sharing resolved)
    # Also emits the canonical `alerts` stream (operational alert system; federation_alert.schema.json),
    # validated + aggregated by the Hub and correlated to entities by municipality/location.

  - program_id: ovnis-pr
    repo: jotaele44/ovnis-pr
    role: anomaly_intelligence_node
    federation_manifest: federation.json
    status: ready_for_live             # 470 real master cases on main (0 synthetic); ready_for_hub_live_execution=true; production_status=PRODUCTION. export_canonical is --mode production on main; verified locally via federation_export.py --mode production (manifest.json emitted, synthetic rows rejected)

  - program_id: skywatcher-pr
    repo: jotaele44/skywatcher-pr
    role: airspace_intelligence_node
    federation_manifest: federation.json
    status: ready_for_discovery        # FR24 ingest/OCR/RLSM pipeline on main; live exec blocked: needs real FlightRadar24 capture to flip ready_for_hub_live_execution

  - program_id: centinelas-pr
    repo: jotaele44/centinelas-pr
    role: pre_officialization_signal_producer
    federation_manifest: federation.json
    status: ready_for_live             # live RSS intake bridged: 274 real signals in data/signals/live_signals.jsonl; production export hub-validated; ready_for_hub_live_execution=true (operator-approved 2026-07-03)
