name: MCP Registry Drift (scheduled)

# Weekly drift sweep + on-demand run. If the registry and project manifests
# have diverged, this opens (or updates) a same-repo tracking issue so the
# drift is visible without waiting for the next PR that happens to touch mcp/**.
#
# Cross-repo propagation (opening PRs on the sibling producer repos) needs an
# operator-provided PAT with cross-repo scope and each producer's config
# layout — that automation is intentionally NOT included here.

on:
  schedule:
    - cron: "0 7 * * 1" # Mondays 07:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyyaml
      - name: Check registry drift
        id: drift
        run: |
          if python tools/check_registry_drift.py > drift.txt 2>&1; then
            echo "drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "drift=true" >> "$GITHUB_OUTPUT"
          fi
          cat drift.txt
      - name: Open or update drift issue
        if: steps.drift.outputs.drift == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '```\n' + fs.readFileSync('drift.txt', 'utf8') + '\n```';
            const title = 'MCP registry drift detected';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'mcp-drift',
            });
            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.data[0].number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ['mcp-drift'],
              });
            }
