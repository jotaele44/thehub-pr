name: desktop-build

# Builds the standalone double-click desktop app (PyInstaller) for each OS.
# Runs on demand, and attaches the bundles to the release on desktop-v* tags.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build frontend (same-origin)
        env:
          VITE_API_BASE: ""
        run: |
          npm ci --no-audit --no-fund
          npm run build
        working-directory: server/frontend

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r server/backend/requirements.txt -r requirements-desktop.txt pyinstaller

      - name: Freeze desktop app
        run: pyinstaller desktop/pyinstaller.spec --distpath dist-desktop --noconfirm

      - name: Smoke test frozen app
        shell: python
        run: |
          import pathlib, subprocess, sys
          name = "PRII-THEHUB"
          exe = pathlib.Path("dist-desktop") / name / (name + (".exe" if sys.platform == "win32" else ""))
          result = subprocess.run([str(exe), "--smoke"], timeout=120)
          sys.exit(result.returncode)

      - name: Package bundle
        shell: bash
        run: |
          cd dist-desktop
          if [ "$RUNNER_OS" = "macOS" ] && [ -d "PRII-THEHUB.app" ]; then
            zip -qry "PRII-THEHUB-${RUNNER_OS}.zip" "PRII-THEHUB.app"
          else
            7z a -bd "PRII-THEHUB-${RUNNER_OS}.zip" "PRII-THEHUB" > /dev/null
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: PRII-THEHUB-${{ runner.os }}
          path: dist-desktop/PRII-THEHUB-*.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-desktop/PRII-THEHUB-*.zip
