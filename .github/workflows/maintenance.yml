name: maintenance

# Audit-first federation maintenance. Runs the maintenance unit tests and a
# best-effort rollup over whatever producer checkouts are present. Never
# auto-commits; the rollup is uploaded as an artifact only.

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"   # Mondays 06:17 UTC

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: python -m pip install -e ".[dev]"

      - name: Maintenance unit tests
        run: python -m pytest tests/test_maintenance_schemas.py tests/test_maintenance_rollup.py tests/test_maintenance_gate.py tests/test_hub_cli_maintenance.py -q

      - name: Rollup (audit mode, non-failing)
        run: hub maintenance --root . --write-report --json || true

      - name: Upload rollup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: federation-maintenance-rollup
          path: reports/federation_maintenance/latest.json
          if-no-files-found: ignore
