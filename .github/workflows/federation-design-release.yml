name: federation-design-release

# Packs the shared @pr-federation/react design-system package and, on a
# federation-design-v* tag, attaches the tarball to the GitHub Release so the
# six producer frontends can pin it (see federation-design/packages/react/README.md).
# On PRs that touch the package it only validates that `npm pack` succeeds.

on:
  workflow_dispatch:
  push:
    tags:
      - "federation-design-v*"
  pull_request:
    branches: [main]
    paths:
      - "federation-design/**"
      - ".github/workflows/federation-design-release.yml"

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: federation-design/packages/react
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Pack the package (runs prepack asset bundling)
        run: npm pack

      - name: Verify the tarball bundled the canonical assets
        run: |
          tgz=$(ls pr-federation-react-*.tgz)
          echo "packed: $tgz"
          tar -tzf "$tgz" | sort
          tar -tzf "$tgz" | grep -q 'package/dist/federation.css'
          tar -tzf "$tgz" | grep -q 'package/dist/federation.tokens.json'
          tar -tzf "$tgz" | grep -q 'package/src/index.jsx'

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/federation-design-v')
        uses: softprops/action-gh-release@v2
        with:
          files: federation-design/packages/react/pr-federation-react-*.tgz
