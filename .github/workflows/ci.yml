name: Hub CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]" httpx -r server/backend/requirements.txt
      - name: Schemas are well-formed JSON
        run: python -c "import json, glob; [json.load(open(f)) for f in glob.glob('schemas/*.json')]; print('schemas ok')"
      - name: Registry loads
        run: python -m hub list --registry registry/producers.yaml
      - name: Tests
        run: pytest -q

  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lock file is up to date
        run: uv lock --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src/hub tests
      - name: Mypy
        run: mypy src/hub

  # Self-contained sub-project (packages/prii_maintenance) — its own CI, isolated
  # from the root test matrix since its consumers (spiderweb-pr >=3.11,
  # skywatcher-pr 3.10+) don't need the root matrix's Python 3.9 floor.
  maintenance-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]" -e packages/prii_maintenance
      - name: Ruff
        run: ruff check packages/prii_maintenance
      - name: Mypy
        run: mypy packages/prii_maintenance/src
      - name: Tests
        run: pytest packages/prii_maintenance/tests -q
