<!doctype html>
<!-- data-theme / data-repo are set statically so the federation dark theme +
     hub accent apply on first paint (no flash before main.jsx runs). -->
<html lang="en" data-theme="dark" data-repo="thehub-pr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>TheHub PR</title>
    <!-- Set the theme before first paint so dark-preference users never see a
         light flash. Mirrors resolveInitialTheme() in src/lib/theme.jsx
         (stored preference -> OS preference -> dark). -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('fd-theme:thehub-pr');
          var theme = (stored === 'light' || stored === 'dark') ? stored
            : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          var root = document.documentElement;
          root.classList.toggle('dark', theme === 'dark');
          root.dataset.theme = theme;
          root.dataset.repo = 'thehub-pr';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
