# Skill activation / dependency model.
#
# Edges are "may hand off to". Invariants are hard gates the validator and
# tests enforce. Every node must be a skill_id in skill-registry.yaml.
#
# Seed state: a single Hub conformance skill, so the graph is a single root with
# no edges yet. The Hub's fuller skill set (discover / aggregate / correlate /
# ingest) adds edges here as it lands.

schema_version: prii_dependency_graph_v1

root: prii-validate-producer-manifest

edges: {}

invariants:
  - id: manifest-validation-is-read-only
    rule: "prii-validate-producer-manifest is read_only; it validates a producer federation.json against the Hub-owned schema and never mutates or promotes the producer's manifest or export"
    applies_to: [prii-validate-producer-manifest]
